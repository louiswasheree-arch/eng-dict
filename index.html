<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Up and Up English</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header class="site-header">
    <h1>Up and Up English</h1>
  </header>

  <nav class="main-nav">
    <a href="#dictionary" class="nav-btn active" data-tab="dictionary">
      <i class="fas fa-book"></i> Dictionary
    </a>
    <a href="#word-of-day" class="nav-btn" data-tab="word-of-day">
      <i class="fas fa-star"></i> Word of the Day
    </a>
    <a href="#bookmarks" class="nav-btn" data-tab="bookmarks">
      <i class="fas fa-heart"></i> Bookmarks
    </a>
  </nav>

  <main class="content-wrapper">
    <section id="dictionary">
      <div class="search-container">
        <h2>Advanced English Dictionary & Learning Hub</h2>
        <div class="search-box">
          <div class="filter-row">
            <label><i class="fas fa-filter"></i> Word Type:</label>
            <select id="wordType">
              <option value="">All Types</option>
              <option value="noun">Noun</option>
              <option value="verb">Verb</option>
              <option value="adjective">Adjective</option>
              <option value="adverb">Adverb</option>
            </select>
          </div>
          <div class="input-row">
            <input type="text" id="searchInput" placeholder="Search a word..." autocomplete="off">
            <button id="searchBtn" class="ripple-trigger">
              <i class="fas fa-search"></i> Search
            </button>
          </div>
        </div>
      </div>
      <div id="loading" class="loading hidden">Searching...</div>
      <div id="error" class="error hidden"></div>
      <div id="results" class="hidden"></div>
    </section>

    <section id="word-of-day" class="hidden">
      <h2>Word of the Day</h2>
      <div id="word-of-day-container" class="wotd-card">Loading...</div>
    </section>

    <section id="bookmarks" class="hidden">
      <h2>My Bookmarks</h2>
      <div id="bookmarks-container" class="bookmarks-grid"></div>
      <p id="empty-bookmarks" class="empty-state hidden">No bookmarks yet. Search and save words to study!</p>
    </section>
  </main>

  <footer class="site-footer">
    <p class="footer-text">
      For more languages,<br>
      <em>các từ điển ngôn ngữ khác của chúng mình</em>
    </p>
    <a href="#" class="other-dict-btn">
      <span class="dict-icon">A</span> Từ điển Trung - Việt
    </a>
  </footer>
  <script src="app.js"></script>
</body>
</html>
